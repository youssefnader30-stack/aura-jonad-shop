<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="aura" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E0D1"/>
      <stop offset="100%" stop-color="#6A5CFF"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#00E0D1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00E0D1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Mark: overlapping ring + crosshair -->
  <g transform="translate(40,40)">
    <circle r="28" fill="url(#glow)" opacity="0.5"/>
    <circle r="22" fill="none" stroke="url(#aura)" stroke-width="3"/>
    <circle cx="8" cy="0" r="22" fill="none" stroke="url(#aura)" stroke-width="3" opacity="0.75"/>
    <!-- Crosshair -->
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#F5F7FA" stroke-width="0.6" opacity="0.55"/>
    <line x1="4" y1="-30" x2="4" y2="30" stroke="#F5F7FA" stroke-width="0.6" opacity="0.55"/>
    <circle cx="4" cy="0" r="2" fill="#00E0D1"/>
  </g>

  <!-- Wordmark -->
  <text x="90" y="50"
        font-family="Geist Sans, Inter, system-ui, sans-serif"
        font-weight="700"
        font-size="26"
        letter-spacing="-0.03em"
        fill="#F5F7FA">AURA<tspan fill="#00E0D1">·</tspan>JONAD</text>
  <text x="90" y="66"
        font-family="JetBrains Mono, monospace"
        font-size="9"
        letter-spacing="0.25em"
        fill="#8A8F98">AI · AUTOMATION · SYSTEMS</text>
</svg>
